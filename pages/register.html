				<button class="header__menu-toggle" aria-label="Menu">
					<span class="header__menu-toggle-bar"></span>
					<span class="header__menu-toggle-bar"></span>
					<span class="header__menu-toggle-bar"></span>
				</button>

				<nav class="header__nav">
					<ul class="header__menu">
						<li class="header__menu-item">
							<a href="index.html" class="header__menu-link">Home</a>
						</li>
						<li class="header__menu-item">
							<a href="products.html" class="header__menu-link">Produtos</a>
						</li>
						<li class="header__menu-item">

						<li class="header__menu-item">

						</li>
						<li class="header__menu-item">
							<a href="contact.html" class="header__menu-link">Contato</a>
						</li>
					</ul>
					<div class="header__actions">
						<button class="header__icon-btn" data-login-btn aria-label="Login">
							<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
								<circle cx="12" cy="7" r="4"></circle>
							</svg>
						</button>
						<button class="header__icon-btn" data-cart-btn aria-label="Carrinho">
							<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

				<div class="header__overlay"></div>
			</div>
		</header>

		<main class="main-content">
			<div class="auth-page">
				<div class="auth-card" style="max-width:520px">
					<a href="index.html" class="auth-card__logo">
						<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
							<rect width="40" height="40" rx="8" fill="currentColor" />
							<path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
						</svg>
						TechShop
					</a>

					<h1 class="auth-card__title">Criar sua conta</h1>
					<p class="auth-card__subtitle">Grátis e sem compromisso</p>

					<form data-validate id="registerForm">
						<div class="form__group">
							<label class="form__label form__label--required" for="fullName">Nome completo</label>
							<input type="text" id="fullName" name="fullName" class="form__input" placeholder="João Silva" required minlength="3" autocomplete="name" />
						</div>

						<div class="form__group">
							<label class="form__label form__label--required" for="email">E-mail</label>
							<input type="email" id="email" name="email" class="form__input" placeholder="seu@email.com" required autocomplete="email" />
						</div>

						<div class="form__group">
							<label class="form__label" for="phone">Telefone <span style="color:var(--gray-400);font-weight:400">(opcional)</span></label>
							<input type="tel" id="phone" name="phone" class="form__input" placeholder="(11) 99999-9999" autocomplete="tel" />
						</div>

						<div class="form__group">
							<label class="form__label form__label--required" for="password">Senha</label>
							<input type="password" id="password" name="password" class="form__input" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password" />
						</div>

						<div class="form__group">
							<label class="form__label form__label--required" for="confirmPassword">Confirmar senha</label>
							<input type="password" id="confirmPassword" name="confirmPassword" class="form__input" placeholder="Repita a senha" required minlength="6" autocomplete="new-password" data-match="password" />
						</div>

						<div class="form__group">
							<div class="form__checkbox">
								<input type="checkbox" id="terms" name="terms" required />
								<label class="form__checkbox-label" for="terms">
									Li e aceito os <a href="#" style="color:var(--primary);font-weight:600">Termos de Uso</a> e a <a href="#" style="color:var(--primary);font-weight:600">Política de Privacidade</a>
								</label>
							</div>
						</div>

						<button type="submit" class="btn btn-primary" style="width:100%">Criar conta</button>
					</form>

					<div class="auth-card__footer">
						Já tem uma conta?
						<a href="login.html">Entrar</a>
					</div>
				</div>
			</div>
		</main>

		<footer class="footer">
			<div class="footer__container">
				<div class="footer__bottom">
					<p class="footer__copyright">&copy; 2026 TechShop. Todos os direitos reservados.</p>
				</div>
			</div>
