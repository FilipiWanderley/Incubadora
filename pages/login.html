		<main class="main-content">

					<a href="index.html" class="auth-card__logo">
						<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
							<rect width="40" height="40" rx="8" fill="currentColor" />

					<h1 class="auth-card__title">Bem-vindo de volta</h1>
					<p class="auth-card__subtitle">Entre com sua conta para continuar</p>

					<form data-validate id="loginForm">
						<div class="form__group">
							<label class="form__label form__label--required" for="email">E-mail</label>
							<input type="email" id="email" name="email" class="form__input" placeholder="seu@email.com" required autocomplete="email" />
						</div>

						<div class="form__group">
							<label class="form__label form__label--required" for="password">Senha</label>
							<input type="password" id="password" name="password" class="form__input" placeholder="••••••••" required minlength="6" autocomplete="current-password" />
							<a href="#" class="auth-card__forgot">Esqueci minha senha</a>
						</div>

						<div class="form__group">
							<div class="form__checkbox">
								<input type="checkbox" id="remember" name="remember" />
								<label class="form__checkbox-label" for="remember">Lembrar-me por 30 dias</label>
							</div>
						</div>

						<button type="submit" class="btn btn-primary btn-block">Entrar</button>
					</form>

					<div class="auth-card__footer">
						Não tem uma conta?
						<a href="register.html">Criar conta grátis</a>
					</div>
				</div>
